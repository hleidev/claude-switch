# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: claude-switch
    main: .
    binary: cs
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Homebrew Cask — distributes the pre-built macOS binary. GoReleaser commits the
# generated cask to the hleidev/homebrew-claude-switch tap on every tagged release.
homebrew_casks:
  - name: claude-switch
    # Defaults to the cask name, which is not the binary name.
    binaries: [cs]
    repository:
      owner: hleidev
      name: homebrew-claude-switch
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/hleidev/claude-switch"
    description: "Switch Claude Code's backend per terminal — one command, no global config"
    # Unsigned binary: macOS quarantines it on download. Strip the flag.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/cs"]
          end
    caveats: |
      One more step — `cs use` needs shell integration to change the current
      terminal's environment:

        1. cs setup      # writes the integration into your rc file
        2. exec $SHELL   # or just open a new terminal

      Step 1 is idempotent. Run `cs doctor` if anything looks off.
