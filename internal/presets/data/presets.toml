# Built-in provider presets. Each table is a flat set of environment variables
# the provider needs, keyed by their real variable names; `cs use` exports them
# (merged under any user override). Values are sourced from each provider's
# official Claude Code documentation; do not invent parameters. Adding a new
# preset is a data-only change here. Only doc-verified providers are shipped.
# Presets carry no secret — the user supplies ANTHROPIC_AUTH_TOKEN.

[minimax]
ANTHROPIC_BASE_URL = "https://api.minimaxi.com/anthropic"
ANTHROPIC_DEFAULT_HAIKU_MODEL = "MiniMax-M3-highspeed"
ANTHROPIC_DEFAULT_SONNET_MODEL = "MiniMax-M3[1m]"
ANTHROPIC_DEFAULT_OPUS_MODEL = "MiniMax-M3[1m]"
ANTHROPIC_DEFAULT_FABLE_MODEL = "MiniMax-M3[1m]"
CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC = "1"
CLAUDE_CODE_AUTO_COMPACT_WINDOW = "1000000"

[deepseek]
ANTHROPIC_BASE_URL = "https://api.deepseek.com/anthropic"
ANTHROPIC_DEFAULT_HAIKU_MODEL = "deepseek-v4-flash"
ANTHROPIC_DEFAULT_SONNET_MODEL = "deepseek-v4-pro"
ANTHROPIC_DEFAULT_OPUS_MODEL = "deepseek-v4-pro"
ANTHROPIC_DEFAULT_FABLE_MODEL = "deepseek-v4-pro"
CLAUDE_CODE_EFFORT_LEVEL = "max"
CLAUDE_CODE_SUBAGENT_MODEL = "deepseek-v4-flash"

[glm]
ANTHROPIC_BASE_URL = "https://open.bigmodel.cn/api/anthropic"
ANTHROPIC_DEFAULT_HAIKU_MODEL = "glm-4.7"
ANTHROPIC_DEFAULT_SONNET_MODEL = "glm-5.2[1m]"
ANTHROPIC_DEFAULT_OPUS_MODEL = "glm-5.2[1m]"
ANTHROPIC_DEFAULT_FABLE_MODEL = "glm-5.2[1m]"
API_TIMEOUT_MS = "3000000"
CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC = "1"
CLAUDE_CODE_AUTO_COMPACT_WINDOW = "1000000"

[anthropic]
ANTHROPIC_BASE_URL = "https://api.anthropic.com"
